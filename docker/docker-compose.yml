services:
        db:
                container_name: db
                platform: linux/x86_64
                image: mysql:8.0.23
                command:
                        - --default-authentication-plugin=mysql_native_password
                        - --character-set-server=utf8mb4
                        - --collation-server=utf8mb4_unicode_ci
                        - --lower_case_table_names=1
                restart: always
                environment:
                        MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                        MYSQL_MAX_CONNECTIONS: 5000
                volumes:
                        - ./data:/var/lib/mysql
#                        - ./initdb.d:/docker-entrypoint-initdb.d
#                        - ./my.cnf:/etc/mysql/conf.d/my.cnf
                        - ./init-db/init-db.sh:/init-db.sh
                entrypoint: ["/bin/bash", "/init-db.sh"]
                ports:
                        - "3306:3306"
        redis:
                container_name: redis
                image: redis:alpine
                ports:
                        - "6379:6379"
                volumes:
                        - ./redis-data:/data
                environment:
                        - REDIS_REPLICATION_MODE=master
                restart: always
                deploy:
                        resources:
                                limits:
                                        memory: 256M
        mongo:
                image: mongodb/mongodb-atlas-local:latest
                container_name: mongo
                restart: always
                environment:
                        MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
                        MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
                ports:
                        - "27017:27017"
                volumes:
                        - ./mongo_data:/data/db
        identity:
                container_name: identity
                platform: linux/x86_64
                build:
                        context: ../
                        args:
                                APP_NAME: identity
                command: node dist/apps/identity/src/main.js
                environment:
                        NODE_ENV: test
                        SERVER_PORT: 8080
                        PORT: 8080
                        IDENTITY_GRPC_URL: "0.0.0.0:50051"
                        REDIS_DB_HOST: redis
                        REDIS_DB_PORT: 6379
                        CHAT_REDIS_HOST: redis
                        CHAT_REDIS_PORT: 6379
                        CHAT_REDIS_DB_NUMBER: 2
                        PERSONAL_DB_HOST: db
                        PERSONAL_DB_PORT: 3306
                        PERSONAL_DB_USER_NAME: ${DB_USER}
                        PERSONAL_DB_USER_PW: ${DB_USER_PW}
                        PERSONAL_DB_NAME: personal
                        PERSONAL_DB_SYNCHRONIZE: "true"
                        GAME_DB_HOST: db
                        GAME_DB_PORT: 3306
                        GAME_DB_USER_NAME: ${DB_USER}
                        GAME_DB_USER_PW: ${DB_USER_PW}
                        GAME_DB_NAME: game
                        GAME_DB_SYNCHRONIZE: "true"
                        MONGODB_ATLAS_URI: mongodb://mongo:27017
                        ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
                        REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
                        GROQ_API_KEY: ${GROQ_API_KEY}
                ports:
                        - "8080:8080"
                depends_on:
                        - db
                        - redis
                        - mongo
        payment:
                container_name: payment
                platform: linux/x86_64
                build:
                        context: ../
                        args:
                                APP_NAME: payment
                command: node dist/apps/payment/src/main.js
                environment:
                        NODE_ENV: test
                        SERVER_PORT: 8081
                        PORT: 8081
                        PAYMENT_GRPC_URL: "0.0.0.0:50052"
                        REDIS_DB_HOST: redis
                        REDIS_DB_PORT: 6379
                        CHAT_REDIS_HOST: redis
                        CHAT_REDIS_PORT: 6379
                        CHAT_REDIS_DB_NUMBER: 2
                        PERSONAL_DB_HOST: db
                        PERSONAL_DB_PORT: 3306
                        PERSONAL_DB_USER_NAME: ${DB_USER}
                        PERSONAL_DB_USER_PW: ${DB_USER_PW}
                        PERSONAL_DB_NAME: personal
                        PERSONAL_DB_SYNCHRONIZE: "true"
                        GAME_DB_HOST: db
                        GAME_DB_PORT: 3306
                        GAME_DB_USER_NAME: ${DB_USER}
                        GAME_DB_USER_PW: ${DB_USER_PW}
                        GAME_DB_NAME: game
                        GAME_DB_SYNCHRONIZE: "true"
                        PAYMENT_DB_HOST: db
                        PAYMENT_DB_PORT: 3306
                        PAYMENT_DB_USER_NAME: ${DB_USER}
                        PAYMENT_DB_USER_PW: ${DB_USER_PW}
                        PAYMENT_DB_NAME: payment
                        PAYMENT_DB_SYNCHRONIZE: "true"
                        ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
                        REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
                ports:
                        - "8081:8081"
                depends_on:
                        - db
                        - redis
        chat-service:
                container_name: chat-service
                platform: linux/x86_64
                build:
                        context: ../
                        args:
                                APP_NAME: chat-service
                command: node dist/apps/chat-service/src/main.js
                environment:
                        NODE_ENV: test
                        CHAT_GRPC_URL: "0.0.0.0:50053"
                        REDIS_DB_HOST: redis
                        REDIS_DB_PORT: 6379
                        CHAT_REDIS_HOST: redis
                        CHAT_REDIS_PORT: 6379
                        CHAT_REDIS_DB_NUMBER: 2
                        ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
                depends_on:
                        - redis
        gateway:
                container_name: gateway
                platform: linux/x86_64
                build:
                        context: ../
                        args:
                                APP_NAME: gateway
                command: node dist/apps/gateway/src/main.js
                environment:
                        NODE_ENV: test
                        SERVER_PORT: 3000
                        PORT: 3000
                        IDENTITY_GRPC_URL: "identity:50051"
                        PAYMENT_GRPC_URL: "payment:50052"
                        CHAT_GRPC_URL: "chat-service:50053"
                        REDIS_DB_HOST: redis
                        REDIS_DB_PORT: 6379
                        CHAT_REDIS_HOST: redis
                        CHAT_REDIS_PORT: 6379
                        CHAT_REDIS_DB_NUMBER: 2
                        PERSONAL_DB_HOST: db
                        PERSONAL_DB_PORT: 3306
                        PERSONAL_DB_USER_NAME: ${DB_USER}
                        PERSONAL_DB_USER_PW: ${DB_USER_PW}
                        PERSONAL_DB_NAME: personal
                        PERSONAL_DB_SYNCHRONIZE: "true"
                        ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
                        REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
                ports:
                        - "3000:3000"
                depends_on:
                        - identity
                        - payment
                        - chat-service
        ai-service:
                container_name: ai-service
                build:
                        context: ../
                        dockerfile: Dockerfile
                        args:
                                APP_NAME: ai-service
                command: node dist/apps/ai-service/src/main.js
                environment:
                        NODE_ENV: test
                        AI_SERVICE_PORT: 3004

                        LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
                        EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}

                        # Ollama는 호스트에서 실행 (Metal GPU 가속)
                        OLLAMA_BASE_URL: http://host.docker.internal:11434
                        OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:14b}
                        OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3}

                        # 클라우드 LLM (선택)
                        ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
                        OPENAI_API_KEY: ${OPENAI_API_KEY:-}
                        GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
                        GROQ_API_KEY: ${GROQ_API_KEY:-}

                        MONGODB_VECTOR_URI: mongodb://mongo:27017
                        MONGODB_DB_NAME: ai_service
                ports:
                        - "3004:3004"
                extra_hosts:
                        - "host.docker.internal:host-gateway"
                depends_on:
                        - mongo
                restart: unless-stopped
